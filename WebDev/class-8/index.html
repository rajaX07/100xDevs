<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Server</title>
        <script>
        async function add(){
            const a = document.getElementById("first").value;
            const b = document.getElementById("second").value;

            // document.getElementById("response").innerHTML = parseInt(a) + parseInt(b);

            // sending request to backend
            // const res = await fetch("http://localhost:3000/sum/" + a + "/" + b);
            
            //Post request with JSON body 
            const res = await fetch("http://localhost:3000/sum/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    a: a,
                    b: b
                })
            });
            const json = await res.json()
            document.getElementById("response").innerHTML = json.ans;
        }
    </script>
</head>
<body>

    <input type="text" id="first" placeholder="first number" />
    <input type="text" id="second" placeholder="second number"/>

    <button onclick="add()">Add</button>
    <button>Sub</button>
    <button>Mul</button>
    <button>Div</button>

    <div id="response"></div>
</body>
</html>
